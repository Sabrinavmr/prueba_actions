name: Mi Asistente de Python

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  python-qa: # "QA" es Quality Assurance (Aseguramiento de Calidad)
    runs-on: ubuntu-latest

    steps:
      # 1. Traemos tu código al servidor virtual
      - uses: actions/checkout@v4

      # 2. Instalamos Python en el servidor
      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 3. Instalamos 'flake8', que es el "policía" de la prolijidad
      - name: Instalar herramientas de calidad
        run: |
          python -m pip install --upgrade pip
          pip install flake8

      # 4. Ejecutamos la revisión (La alarma)
      - name: Revisar prolijidad y errores (Linter)
        run: |
          # Este comando falla si hay errores de sintaxis o prolijidad grave
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
